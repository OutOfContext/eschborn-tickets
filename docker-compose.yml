services:

  db:
    image: postgres:16-alpine
    container_name: eschborn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eschborn}
      POSTGRES_USER: ${POSTGRES_USER:-eschborn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eschborn}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eschborn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eschborn-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-eschborn}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-eschborn}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-eschborn}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eschborn-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:

