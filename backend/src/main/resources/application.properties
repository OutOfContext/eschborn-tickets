spring.application.name=backend
app.security.enabled=${APP_SECURITY_ENABLED:true}
# Datenbank (Werte werden via Docker Compose als Umgebungsvariablen gesetzt)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eschborn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:eschborn}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eschborn}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

media.storage.root=${MEDIA_STORAGE_ROOT:uploads}

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:20MB}

app.keycloak.bootstrap-enabled=${KEYCLOAK_BOOTSTRAP_ENABLED:true}
app.keycloak.role-cache-enabled=${KEYCLOAK_ROLE_CACHE_ENABLED:true}
app.keycloak.role-cache-ttl-seconds=${KEYCLOAK_ROLE_CACHE_TTL_SECONDS:60}
app.keycloak.resync-interval-ms=${KEYCLOAK_RESYNC_INTERVAL_MS:60000}
app.keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8081}
app.keycloak.admin-realm=${KEYCLOAK_ADMIN_REALM:master}
app.keycloak.admin-username=${KEYCLOAK_ADMIN_USERNAME:admin}
app.keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}
app.keycloak.realm=${KEYCLOAK_REALM:EschbornTicket}
app.keycloak.backend-client-id=${KEYCLOAK_BACKEND_CLIENT_ID:backend-api}
app.keycloak.base-roles=${KEYCLOAK_BASE_ROLES:admin,employee,manager}
app.keycloak.dev-users=${KEYCLOAK_DEV_USERS:admin,dev,project}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/EschbornTicket}

