spring.application.name=backend

# Datenbank (Werte werden via Docker Compose als Umgebungsvariablen gesetzt)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eschborn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:eschborn}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eschborn}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


