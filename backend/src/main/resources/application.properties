spring.application.name=backend
# Datenbank (Werte werden via Docker Compose als Umgebungsvariablen gesetzt)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eschborn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:eschborn}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eschborn}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

media.storage.root=${MEDIA_STORAGE_ROOT:uploads}

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:20MB}
