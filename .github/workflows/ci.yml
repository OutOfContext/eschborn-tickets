  push-to-docker-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker images
        env:
          DOCKER_BUILDKIT: 1
        run: |
          ls -la
          docker build -t raffaelhu/eschborn-backend:latest -f backend/Dockerfile backend
          docker build -t raffaelhu/eschborn-frontend:latest -f frontend/Dockerfile frontend
          docker push raffaelhu/eschborn-backend:latest
          docker push raffaelhu/eschborn-frontend:latest
          

