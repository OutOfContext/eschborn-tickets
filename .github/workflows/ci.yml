name: CI

"on":
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      run_container_build:
        description: 'Zusatzjob fuer Docker-Image-Builds ausfuehren'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  backend:
    name: Backend - Maven Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw
        working-directory: backend

      - name: Run backend tests and package
        run: ./mvnw -B verify
        working-directory: backend

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore

      - name: Upload backend jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: ignore

  frontend:
    name: Frontend - Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: ignore

  containers:
    name: Container Build Check
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.run_container_build == 'true') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose -f docker-compose.yml config -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: eschborn-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: eschborn-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

